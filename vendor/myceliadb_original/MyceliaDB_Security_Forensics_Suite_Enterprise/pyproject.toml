[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "myceliadb-security-forensics"
version = "2.0.5"
description = "Enterprise defensive security and forensic validation suite for MyceliaDB, SMQL-Embedding-Adapter and LM Studio RAG."
requires-python = ">=3.12"
authors = [{name = "MyceliaDB Security Engineering"}]
dependencies = []

[project.scripts]
mycelia-forensics = "mycelia_security_forensics.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
